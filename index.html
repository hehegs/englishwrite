<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3949ab" />
  <title>영어 쓰기 연습 ✏️</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <!-- 따라쓰기 가이드 글씨용 영어 학습 글꼴(온라인일 때 적용, 오프라인은 시스템 글꼴로 대체) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Comic+Neue:wght@400;700&family=Patrick+Hand&family=Edu+VIC+WA+NT+Beginner:wght@400;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">✏️ 영어 쓰기 연습</div>
    <nav class="modes" id="modes">
      <button class="mode-btn active" data-mode="free">자유 필기</button>
      <button class="mode-btn" data-mode="trace">따라쓰기</button>
      <button class="mode-btn" data-mode="dictation">받아쓰기</button>
    </nav>
  </header>

  <!-- 단어 연습 패널 (따라쓰기 / 받아쓰기) -->
  <section class="practice-bar hidden" id="practiceBar">
    <div class="practice-left">
      <label class="field">
        <span>단어장</span>
        <select id="wordSetSelect"></select>
      </label>
      <div class="progress" id="progress">1 / 1</div>
    </div>

    <div class="prompt" id="prompt">
      <!-- 모드에 따라 내용이 바뀜 -->
    </div>

    <div class="practice-right">
      <button class="pill" id="speakBtn" title="발음 듣기">🔊 듣기</button>
      <button class="pill" id="speakSlowBtn" title="천천히 듣기">🐢 천천히</button>
      <button class="pill" id="revealBtn">👀 정답 보기</button>
      <button class="pill" id="prevBtn">◀ 이전</button>
      <button class="pill primary" id="nextBtn">다음 ▶</button>
    </div>
  </section>

  <!-- 그리기 도구 -->
  <section class="toolbar">
    <div class="tool-group">
      <button class="tool active" data-tool="pen" title="펜">🖊️</button>
      <button class="tool" data-tool="highlighter" title="형광펜">🖍️</button>
      <button class="tool" data-tool="eraser" title="지우개">🧽</button>
    </div>

    <div class="tool-group colors" id="colors">
      <button class="swatch active" style="background:#1a237e" data-color="#1a237e"></button>
      <button class="swatch" style="background:#000000" data-color="#000000"></button>
      <button class="swatch" style="background:#e53935" data-color="#e53935"></button>
      <button class="swatch" style="background:#43a047" data-color="#43a047"></button>
      <button class="swatch" style="background:#fb8c00" data-color="#fb8c00"></button>
      <button class="swatch" style="background:#8e24aa" data-color="#8e24aa"></button>
    </div>

    <div class="tool-group">
      <label class="field thin">
        <span>굵기</span>
        <input type="range" id="sizeRange" min="2" max="16" value="4" />
      </label>
    </div>

    <div class="tool-group">
      <label class="field thin">
        <span>배경</span>
        <select id="guideSelect">
          <option value="fourline">영어 4선</option>
          <option value="grid">모눈</option>
          <option value="blank">빈 종이</option>
        </select>
      </label>
    </div>

    <div class="tool-group">
      <label class="field thin">
        <span>글꼴(따라쓰기)</span>
        <select id="fontSelect">
          <option value="comic">기본 (둥근체)</option>
          <option value="andika">또렷한체</option>
          <option value="patrick">손글씨체</option>
          <option value="edu">4선 학습체</option>
        </select>
      </label>
    </div>

    <div class="tool-group push-right">
      <button class="pill" id="undoBtn" title="실행취소">↶ 취소</button>
      <button class="pill" id="redoBtn" title="다시실행">↷ 다시</button>
      <button class="pill" id="clearBtn" title="모두 지우기">🗑️ 지우기</button>
      <button class="pill" id="saveBtn" title="이미지로 저장">💾 저장</button>
    </div>
  </section>

  <main class="canvas-wrap">
    <canvas id="board"></canvas>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/words.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/handwriting.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
