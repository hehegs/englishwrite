  <g stroke="#ffffff" stroke-opacity="0.45" stroke-width="6">
    <line x1="96" y1="150" x2="416" y2="150"/>
    <line x1="96" y1="290" x2="416" y2="290"/>
    <line x1="96" y1="362" x2="416" y2="362"/>
  </g>
  <line x1="96" y1="220" x2="416" y2="220" stroke="#ffffff" stroke-width="8"/>
